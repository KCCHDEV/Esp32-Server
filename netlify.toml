[build]
  publish = "frontend/build"
  command = "node scripts/netlify-build.js"

# Auto-install dependencies for functions
[[plugins]]
  package = "@netlify/plugin-functions-install-core"

# Environment variables for all contexts
[build.environment]
  NODE_ENV = "production"

# Production context
[context.production.environment]
  REACT_APP_ENABLE_SOCKET = "false"

# Deploy preview context  
[context.deploy-preview.environment]
  REACT_APP_ENABLE_SOCKET = "false"

# Branch deploy context
[context.branch-deploy.environment]
  REACT_APP_ENABLE_SOCKET = "false"

# API Routes - Order matters (most specific first)
[[redirects]]
  from = "/api/auth/*"
  to = "/.netlify/functions/auth/:splat"
  status = 200

[[redirects]]
  from = "/env-check"
  to = "/.netlify/functions/env-check"
  status = 200

[[redirects]]
  from = "/connection-test"
  to = "/.netlify/functions/connection-test"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/setup"
  to = "/.netlify/functions/setup"
  status = 200

[[redirects]]
  from = "/auto-setup"
  to = "/.netlify/functions/auto-setup"
  status = 200

[[redirects]]
  from = "/debug"
  to = "/.netlify/functions/debug"
  status = 200

# Fallback for other API calls
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200